<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VUNA Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      font-family: system-ui, sans-serif;
    }
    .calculator-card {
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,.15);
    }
    .display-container {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      gap: 10px;
    }
    #result {
      font-size: 32px;
      border: none;
      background: transparent;
      text-align: right;
      width: 100%;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .btn {
      height: 60px;
      border-radius: 14px;
      font-weight: 600;
    }
    .btn-special {
      background: #e7f6ed;
      color: #198754;
    }
    .btn-operator {
      background: #e7f1ff;
      color: #0d6efd;
    }
    .btn-action {
      background: #fff5f5;
      color: #fa5252;
    }
    .btn-equals {
      background: #0d6efd;
      color: #fff;
    }
    .word-display-area {
      margin-top: 15px;
      padding: 12px;
      border-radius: 14px;
      background: #ffffffaa;
      display: none;
      justify-content: space-between;
      align-items: center;
    }
    .small-label {
      font-size: 10px;
      letter-spacing: 1px;
      color: #6c757d;
      font-weight: 700;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card calculator-card p-4">

        <h4 class="text-center mb-3">VUNA CALCULATOR</h4>

        <div class="display-container">
          <input id="result" disabled placeholder="0" />
          <button class="btn btn-sm btn-outline-secondary" onclick="copyResult()">📋</button>
        </div>

        <div class="word-display-area" id="word-area">
          <div id="word-result"></div>
          <button id="speak-btn" class="btn btn-sm btn-danger" onclick="speakResult()" disabled>🔊</button>
        </div>

        <div class="btn-grid mt-3">
          <button class="btn" onclick="appendToResult(7)">7</button>
          <button class="btn" onclick="appendToResult(8)">8</button>
          <button class="btn" onclick="appendToResult(9)">9</button>
          <button class="btn btn-operator" onclick="operatorToResult('/')">÷</button>

          <button class="btn" onclick="appendToResult(4)">4</button>
          <button class="btn" onclick="appendToResult(5)">5</button>
          <button class="btn" onclick="appendToResult(6)">6</button>
          <button class="btn btn-operator" onclick="operatorToResult('*')">×</button>

          <button class="btn" onclick="appendToResult(1)">1</button>
          <button class="btn" onclick="appendToResult(2)">2</button>
          <button class="btn" onclick="appendToResult(3)">3</button>
          <button class="btn btn-operator" onclick="operatorToResult('+')">+</button>

          <button class="btn" onclick="appendToResult(0)">0</button>
          <button class="btn" onclick="appendToResult('.')">.</button>
          <button class="btn btn-operator" onclick="operatorToResult('-')">−</button>
          <button class="btn btn-operator" onclick="operatorToResult('^')">xʸ</button>

          <button class="btn btn-special" onclick="calculateSquare()">x²</button>
          <button class="btn btn-special" onclick="calculateCube()">x³</button>
          <button class="btn btn-special" onclick="calculateIntegral()">∫</button>
          <button class="btn btn-action" onclick="clearResult()">AC</button>

          <button class="btn btn-special" onclick="toggleLanguage()">🌐 EN ⇄ PT</button>
          <button class="btn btn-equals" onclick="calculateResult()">=</button>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
